name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write  # required for SLSA attestations
  attestations: write

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        shell: pwsh
        run: |
          if ("${{ matrix.use_cross }}" -eq "true") {
            cross build --release --locked --target "${{ matrix.target }}"
          } else {
            cargo build --release --locked --target "${{ matrix.target }}"
          }

      - name: Package
        id: package
        shell: pwsh
        run: |
          $binary = "rep"
          $target = "${{ matrix.target }}"
          $version = $env:GITHUB_REF_NAME
          $releaseDir = Join-Path "target" (Join-Path $target "release")

          if ($env:RUNNER_OS -eq "Windows") {
            $binaryName = "$binary.exe"
            $archive = "$binary-$version-$target.zip"
            Copy-Item (Join-Path $releaseDir $binaryName) $binaryName
            Compress-Archive -Path $binaryName -DestinationPath $archive -Force
          } else {
            $binaryName = $binary
            $archive = "$binary-$version-$target.tar.gz"
            Copy-Item (Join-Path $releaseDir $binaryName) $binaryName
            tar czf $archive $binaryName
          }

          $sha = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLowerInvariant()
          "archive=$archive" >> $env:GITHUB_OUTPUT
          "sha256=$sha" >> $env:GITHUB_OUTPUT

      - name: Attest build provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

      - name: Record checksum
        run: echo "${{ steps.package.outputs.sha256 }}  ${{ steps.package.outputs.archive }}" >> checksums-${{ matrix.target }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.target }}
          path: checksums-${{ matrix.target }}.txt

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: cat artifacts/checksums-*.txt > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            checksums.txt
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write  # required for SLSA attestations
  attestations: write

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo test --locked

  coverage:
    name: Build and Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo install cargo-llvm-cov --locked
      - run: ./build.sh

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  build:
    name: Build / ${{ matrix.target }}
    needs: [fmt, clippy, test, coverage, audit, doc]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux release artifacts are paused until release/install smoke tests
          # cover the published archives.
          # - target: x86_64-unknown-linux-musl
          #   os: ubuntu-latest
          #   use_cross: true
          # - target: aarch64-unknown-linux-musl
          #   os: ubuntu-latest
          #   use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Check release tag matches Cargo.toml
        run: scripts/release-version.sh check

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        shell: pwsh
        run: |
          if ("${{ matrix.use_cross }}" -eq "true") {
            cross build --release --locked --target "${{ matrix.target }}"
          } else {
            cargo build --release --locked --target "${{ matrix.target }}"
          }

      - name: Package
        id: package
        shell: pwsh
        run: |
          $binary = "rep"
          $target = "${{ matrix.target }}"
          $version = $env:GITHUB_REF_NAME
          $releaseDir = Join-Path "target" (Join-Path $target "release")

          if ($env:RUNNER_OS -eq "Windows") {
            $binaryName = "$binary.exe"
            $archive = "$binary-$version-$target.zip"
            Copy-Item (Join-Path $releaseDir $binaryName) $binaryName
            Compress-Archive -Path $binaryName, "LICENSE", "README.md" -DestinationPath $archive -Force
          } else {
            $binaryName = $binary
            $archive = "$binary-$version-$target.tar.gz"
            Copy-Item (Join-Path $releaseDir $binaryName) $binaryName
            tar czf $archive $binaryName LICENSE README.md .agents/skills/rep
          }

          $sha = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLowerInvariant()
          "archive=$archive" >> $env:GITHUB_OUTPUT
          "sha256=$sha" >> $env:GITHUB_OUTPUT

      - name: Attest build provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.package.outputs.archive }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

      - name: Record checksum
        run: echo "${{ steps.package.outputs.sha256 }}  ${{ steps.package.outputs.archive }}" >> checksums-${{ matrix.target }}.txt

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checksum-${{ matrix.target }}
          path: checksums-${{ matrix.target }}.txt

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: cat artifacts/checksums-*.txt > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            checksums.txt
          generate_release_notes: true
